{% set name = "matgl" %}
{% set version = "2.0.9" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/matgl-{{ version }}.tar.gz
  sha256: d84755ef20ab8462016ec73afafda3f3c1e9382b7c7806a966f5fd968abffbb2

build:
  entry_points:
    - mgl = matgl.cli:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=58.0.3
    - pip
  run:
    - pymatgen-core >=2026.2.24
    - pytorch_geometric
    - torch-geometric
    - boto3
    - numpy <3.0
    - torchdata
    - pydantic
    - python >={{ python_min }}
    - ase
    - pymatgen
    - lightning <=2.6.1
    - pytorch <=2.10.0

test:
  imports:
    - matgl
  commands:
    - pip check
    - mgl --help
  requires:
    - pip
    - python {{ python_min }}

about:
  summary: MatGL is a framework for graph deep learning for materials science.
  home: https://github.com/materialsvirtuallab/matgl
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jan-janssen
